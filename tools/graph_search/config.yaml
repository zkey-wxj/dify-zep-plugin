identity:
  name: graph_search
  author: wxj
  label:
    en_US: Graph Search
    zh_Hans: 图谱搜索

description:
  human:
    en_US: Search relevant facts and context from a graph using natural language.
    zh_Hans: 使用自然语言在图谱中检索相关事实与上下文。
  llm: Search relevant facts and context from a graph using natural language.

parameters:
  - name: query
    type: string
    required: true
    label:
      en_US: Query
      zh_Hans: 查询
    human_description:
      en_US: What you want to find from the graph.
      zh_Hans: 你希望在图谱中检索的问题或描述。
    llm_description: What you want to find from the graph.
    form: llm
  - name: user_id
    type: string
    required: false
    label:
      en_US: User ID
      zh_Hans: 用户 ID
    human_description:
      en_US: User graph scope. Use this when searching user-specific memory.
      zh_Hans: 用户图谱范围。检索某个用户的记忆时填写。
    llm_description: User graph scope. Use this when searching user-specific memory.
    form: llm
  - name: graph_id
    type: string
    required: false
    label:
      en_US: Graph ID
      zh_Hans: 图谱 ID
    human_description:
      en_US: Standalone graph scope. Use this when searching shared/domain knowledge.
      zh_Hans: 独立图谱范围。检索共享/领域知识时填写。
    llm_description: Standalone graph scope. Use this when searching shared/domain knowledge.
    form: llm
  - name: scope
    type: select
    required: false
    options:
      - value: edges
        label:
          en_US: edges
          zh_Hans: 边
      - value: nodes
        label:
          en_US: nodes
          zh_Hans: 节点
      - value: episodes
        label:
          en_US: episodes
          zh_Hans: 事件
      - value: thread_summaries
        label:
          en_US: thread_summaries
          zh_Hans: 线程摘要
      - value: observations
        label:
          en_US: observations
          zh_Hans: 观察
      - value: auto
        label:
          en_US: auto
          zh_Hans: 自动
    label:
      en_US: Scope
      zh_Hans: 范围
    human_description:
      en_US: Result focus. Leave empty for automatic/default behavior.
      zh_Hans: 结果聚焦范围。不填则使用默认/自动行为。
    llm_description: Result focus. Leave empty for automatic/default behavior.
    form: llm
  - name: limit
    type: number
    required: false
    label:
      en_US: Limit
      zh_Hans: 限制数量
    human_description:
      en_US: Max number of returned results.
      zh_Hans: 返回结果的最大数量。
    llm_description: Max number of returned results.
    form: llm

extra:
  python:
    source: tools/graph_search/main.py
