identity:
  name: entity_extract
  author: wxj
  label:
    en_US: Entity Extract
    zh_Hans: 节点提取

description:
  human:
    en_US: Extract entities from text via reverse-invoked model
    zh_Hans: 通过反向调用模型从文本抽取实体节点
  llm: Extract entities from text via reverse-invoked model

parameters:
  - name: text
    type: string
    required: true
    label:
      en_US: Text
      zh_Hans: 文本
    human_description:
      en_US: Input text for entity extraction
      zh_Hans: 用于实体抽取的输入文本
    llm_description: Input text for entity extraction
    form: llm
  - name: entity_types
    type: string
    required: false
    label:
      en_US: Entity Types
      zh_Hans: 实体类型
    human_description:
      en_US: Optional entity types. Supports comma/newline text or JSON string payload from upstream tool output
      zh_Hans: 可选实体类型，支持逗号/换行文本，或上游工具输出的 JSON 字符串
    llm_description: Optional entity types. Supports comma/newline text or JSON string payload
    form: llm
  - name: relation_types
    type: string
    required: false
    label:
      en_US: Relation Types
      zh_Hans: 关系类型
    human_description:
      en_US: Optional relation types. Supports comma/newline text or JSON string payload from upstream tool output
      zh_Hans: 可选关系类型，支持逗号/换行文本，或上游工具输出的 JSON 字符串
    llm_description: Optional relation types. Supports comma/newline text or JSON string payload
    form: llm
  - name: model
    type: model-selector
    required: true
    scope: llm
    label:
      en_US: Model
      zh_Hans: 模型
    human_description:
      en_US: Model for reverse invocation extraction
      zh_Hans: 用于反向调用抽取的模型
    llm_description: LLM model config for extraction
    form: form

output_schema:
  type: object
  properties:
    entities_count:
      type: integer
      description: 抽取到的实体数量
    entities:
      type: array
      description: 抽取到的实体列表
      items:
        type: object
        properties:
          name:
            type: string
            description: 实体名称
          type:
            type: string
            description: 实体类型
          description:
            type: string
            description: 实体描述
    entities_markdown:
      type: string
      description: 流式输出的实体 Markdown 表格
    entity_types:
      type: array
      description: 实体类型定义列表
      items:
        type: object
        properties:
          id:
            type: string
            description: 实体类型 ID
          code:
            type: string
            description: 实体类型编码
          label:
            type: string
            description: 实体类型标签
          name:
            type: string
            description: 实体类型名称
          description:
            type: string
            description: 实体类型描述
          properties:
            type: array
            description: 实体类型属性定义
            items:
              type: object
    relation_types:
      type: array
      description: 关系类型定义列表
      items:
        type: object
        properties:
          id:
            type: string
            description: 关系类型 ID
          code:
            type: string
            description: 关系类型编码
          label:
            type: string
            description: 关系类型标签
          name:
            type: string
            description: 关系类型名称
          description:
            type: string
            description: 关系类型描述
          properties:
            type: array
            description: 关系类型属性定义
            items:
              type: object
    entity_type_names:
      type: array
      description: 实体类型名称列表
      items:
        type: string
    relation_type_names:
      type: array
      description: 关系类型名称列表
      items:
        type: string
    topics:
      type: array
      description: 识别到的主题列表
      items:
        type: string
    tokens_used:
      type: integer
      description: 模型调用消耗的 token 数

extra:
  python:
    source: tools/entity_extract/main.py
