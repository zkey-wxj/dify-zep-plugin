identity:
  author: wxj
  name: zep
  label:
    en_US: Zep
    zh_Hans: Zep
  description:
    en_US: Dify Zep plugin
    zh_Hans: Dify Zep 插件
  icon: zep.png
  tags:
    - utilities

credentials_for_provider:
  zep_api_key:
    type: secret-input
    required: true
    label:
      en_US: Zep API key
      zh_Hans: Zep API 密钥
    placeholder:
      en_US: Enter your Zep API key
      zh_Hans: 输入你的 Zep API 密钥
    help:
      en_US: Get the API key from your Zep project
      zh_Hans: 从你的 Zep 项目获取 API 密钥
    url: https://app.getzep.com/projects
  zep_base_url:
    type: text-input
    required: false
    label:
      en_US: Base URL
      zh_Hans: 基础 URL
    placeholder:
      en_US: https://api.getzep.com
      zh_Hans: https://api.getzep.com
    help:
      en_US: Optional custom Zep API base URL
      zh_Hans: 可选的自定义 Zep API 基础 URL
  model:
    type: model-selector
    scope: llm
    required: false
    label:
      en_US: Model
      zh_Hans: 模型
    help:
      en_US: Optional default model for reverse invocation tools
      zh_Hans: 可选默认模型，用于反向调用类工具

tools:
  - tools/graph_add/config.yaml
  - tools/text_to_knowledge_graph/config.yaml
  - tools/entity_extract/config.yaml
  - tools/relation_extract/config.yaml
  - tools/entity_type_extract/config.yaml
  - tools/relation_type_extract/config.yaml
  - tools/graph_create/config.yaml
  - tools/graph_search/config.yaml
  - tools/graph_node_get/config.yaml
  - tools/graph_node_get_by_graph_id/config.yaml
  - tools/graph_edge_get_by_graph_id/config.yaml
  - tools/graph_episode_get/config.yaml
  - tools/graph_delete/config.yaml
  - tools/graph_observation_get/config.yaml
  - tools/graph_observation_delete/config.yaml

extra:
  python:
    source: provider/zep.py
